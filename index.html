<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nurtilek Duishobaev</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <header class="topbar">
      <div class="container topbar-inner">
        <div class="brand">
          <div class="brand-name">nurtilekd</div>
          <nav class="site-nav" aria-label="Main">
            <a href="#home">Home</a>
            <a href="#blog">Blog</a>
          </nav>
        </div>

        <button
          class="theme-toggle"
          id="themeToggle"
          aria-label="Toggle theme"
          title="Toggle theme"
        >
          ☀️
        </button>
      </div>
    </header>

    <main>
      <section id="home" class="hero">
        <div class="container hero-stack">
          <img src="img/shalfei.jpg" alt="Shalfei the cat" class="avatar" />

          <h1 class="name">Nurtilek Duishobaev</h1>

          <div class="contact-rows" aria-label="Contact">
            <a class="contact-row" href="mailto:andyandy@kaist.ac.kr">
              <span class="icon icon1" aria-hidden="true"></span>
              <span class="value">andyandy@kaist.ac.kr</span>
            </a>

            <a class="contact-row" href="tel:+81046497885">
              <span class="icon icon2" aria-hidden="true"></span>
              <span class="value">+810-4649-7885</span>
            </a>

            <a
              class="contact-row"
              href="https://www.linkedin.com/in/nurtilekd/"
              target="_blank"
              rel="noopener"
            >
              <span class="icon icon3" aria-hidden="true"></span>
              <span class="value">linkedin.com/in/nurtilekd</span>
            </a>
          </div>
        </div>
      </section>

      <section id="blog">
        <div class="container">
          <h2 class="section-title">Blog</h2>

          <div class="textbook-grid">
            <div class="textbook">
              <h4>Posts</h4>
              <ul class="note-list">
                <!-- for later -->
                <!--------------->
              </ul>
              <p class="muted">Nothing here yet.</p>
            </div>
          </div>
        </div>
      </section>

      <footer class="site-footer">
        <div class="container">
          <p>&copy; 2026 Nurtilek Duishobaev.</p>
        </div>
      </footer>
    </main>

    <script src="js/theme.js"></script>
  </body>
</html>
